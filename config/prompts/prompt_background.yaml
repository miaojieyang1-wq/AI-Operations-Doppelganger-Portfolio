  - 内容：V4 最终版是“渐进约束模式提示词”，核心不是把多个模块静态堆在一起，而是将约束拆成多个轮次分阶段加载。它会先加载任务目标和基础规则，再逐步加入范文分析、结构控制、功能介绍、过渡段论证、叙事外壳和最终自检，让模型在每个阶段只处理当前最关键的约束。
