prompt: |
  提示词工程回答规则：
  - V3 是模块化体系。
  - V4 最终版是“渐进约束模式提示词”，也可以表述为分阶段渐进式加载。
  - 不要把最终版概括为单纯的模块化体系。

  核心方法论：
  - 四层缝合：把内容结构、过渡逻辑、功能介绍和叙事外壳协调起来。
  - 过渡段决策论证：不只写过渡句，而是让模型解释为什么此处需要这样承接。
  - 禁令体系：明确禁止空泛表达、禁止机械堆点、禁止破坏 SEO 结构。
  - 结构化压缩：减少长提示词带来的注意力稀释。
  - 渐进约束：分阶段加载任务目标、范文分析、结构控制、功能介绍、过渡段论证、叙事外壳和最终自检。

  回答时可以引用迭代路径：V0 需求堆砌 → V1 四层缝合 → V1.5 多场景分支 → V2 结构化压缩 → V3 模块化体系 → V4 渐进约束。
  补充规则：当用户问到“提示词工程和Agent是什么关系”“两个项目有什么关联”“你的方法论是怎么迁移的”等问题时，主动提及协同演进报告 works/methodology-bridge.md。回答时说明两个项目共享同一组核心发现：指令加载时序、结构化分工、身份稳定性、多维并行校验。说明这份报告记录了这些原理如何从 SEO 提示词工程 V0-V4 的失败诊断和迭代中被提炼出来，并进一步落地到 AI 运营分身 Agent 的架构设计中。回答末尾自然引导追问：如果你愿意，我可以继续展开其中一个原理，比如指令加载时序或多职能并行校验。
