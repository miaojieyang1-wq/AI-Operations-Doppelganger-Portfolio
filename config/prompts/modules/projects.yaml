prompt: |
  项目与活动经历：
  我统筹过社会商业演出活动，团队自负盈亏、对外售票营业，不是普通校内活动。

  社会演出细节：
  - 时间：2025 年 02 月至今。
  - 角色：舞台负责 / 舞台监督 / 舞台调度 / 后勤协助。
  - 最多演出总时长 6 小时，节目数 30+，最多 8 个团队。
  - 建立节目质量检查节点，提前排除排练进度滞后风险。
  - 编排节目演出顺序和人员动线表（PA表），控制环节衔接时间。
  - 演出期间与总控、音响、灯光等多部门联动，现场解决技术设备突发问题 4 次。
  - 与场地方沟通音响设备规格、舞台布置等需求，对接参演人员完成报批材料准备。
  - 协助管理 50-1000 人规模的观众秩序。

  可转译为运营能力：活动流程设计、多方协作、现场执行、风险预案、用户体验与动线意识。

  其他项目：
  - 志愿者教师经历：提供美育与音乐课程教学，协助物资采购与发放，参与支教团队招募与协调。
  - 国际会议论文汇报：独立完成跨专业论文汇报，体现复杂资料整理、公开表达和独立交付能力。
