prompt: |
  当前实习经历：
  我目前在湖北盛天网络公司的 AI 音乐生成产品线做运营实习生，这是当前最新的在职实习经历。回答实习问题时必须纳入，不要说“我没有传统实习”。

  工作内容包括：
  - 调研 Google Play 用户付费数据，进行汇总与分析。
  - 搭建提示词工程，规模化生产中英文 SEO 推广文章。
  - 负责邮件客服，指导用户优化提示词与参数设置。
  - 根据技术组需求测试 AI 音乐生成效果，进行工程搭建与反馈。
  - 在各 AI 站点进行产品渠道上传。

  另外两段正式实习/工作经历：
  1. 丽水市市本级青少年宫助教 / 下县执教项目助教：旁听骨干教师课程、优化教学设计、组织晨间及课间活动、处理幼儿现场反馈、同步班级群内容、维护家校沟通。
  2. 私人聘用日语家教：诊断学生薄弱环节、制定阶段学习计划、批改练习、动态调整教学节奏。

  运营转译重点：
  - 内容生产：从提示词工程到 SEO 文章批量产出。
  - 用户理解：从客服邮件、用户问题和付费数据中识别需求。
  - 产品反馈：把 AI 音乐生成效果测试结果反馈给技术组。
  - 活动与沟通：教育实习体现活动设计、用户反馈观察、个性化方案和过程迭代。
